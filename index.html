<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUMST — تحف رقمية</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
</head>
<body>

  <!-- Header -->
  <header id="site-header">
    <div class="header-inner">
      <a href="#/" class="logo">GUMST</a>

      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="ابحث..." />
      </div>

      <div class="header-actions">
        <div id="admin-controls" class="hidden">
          <a href="#/admin" id="admin-link" class="btn-admin-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
            <span class="hide-sm">المنتجات</span>
          </a>
          <button id="add-product-btn" class="btn-add" title="إضافة منتج">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          </button>
        </div>

        <button id="auth-btn" class="btn-auth">
          <svg id="auth-icon-login" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          <svg id="auth-icon-logout" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          <span id="auth-label" class="hide-sm">تسجيل دخول</span>
        </button>
      </div>
    </div>
  </header>

  <main id="app"></main>

  <footer id="site-footer">
    <p>جميع الحقوق محفوظة © <span id="footer-year"></span></p>
    <p class="footer-sub">Powered by Gumroad Integration</p>
  </footer>

  <!-- ── Auth Modal ── -->
  <div id="auth-overlay" class="modal-overlay hidden">
    <div class="modal-box auth-box">
      <div class="modal-header">
        <h2 id="auth-modal-title">تسجيل الدخول</h2>
        <button id="auth-modal-close" class="modal-close">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">تسجيل دخول</button>
        <button class="auth-tab" data-tab="signup">إنشاء حساب</button>
      </div>

      <form id="auth-form" class="modal-body auth-body">
        <div id="auth-error" class="auth-error hidden"></div>

        <div id="signup-name-wrap" class="form-group hidden">
          <label>الاسم</label>
          <input type="text" id="auth-name" placeholder="أحمد محمد" autocomplete="name" />
        </div>

        <div class="form-group">
          <label>الإيميل</label>
          <input type="email" id="auth-email" placeholder="example@email.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="password-wrap">
            <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password" minlength="6" />
            <button type="button" id="toggle-pass" class="toggle-pass" title="إظهار / إخفاء">
              <svg id="eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-hide" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
            </button>
          </div>
        </div>

        <div id="forgot-wrap" class="forgot-wrap">
          <button type="button" id="forgot-btn" class="forgot-btn">نسيت كلمة المرور؟</button>
        </div>

        <button type="submit" id="auth-submit-btn" class="btn-submit">
          تسجيل الدخول
        </button>
      </form>
    </div>
  </div>

  <!-- ── Product Modal ── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">إضافة منتج جديد</h2>
        <button id="modal-close" class="modal-close">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <form id="product-form" class="modal-body">
        <input type="hidden" id="edit-product-id" />

        <div class="form-group">
          <label>عنوان المنتج</label>
          <input type="text" id="f-title" placeholder="النعمة الضائعة" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>السعر (USD)</label>
            <input type="number" id="f-price" step="0.01" placeholder="5.00" required />
          </div>
          <div class="form-group">
            <label>معلومات الملف</label>
            <input type="text" id="f-fileinfo" placeholder="PDF (12MB)" />
          </div>
        </div>

        <div class="form-group">
          <label>صورة المنتج</label>
          <label id="image-drop-zone" class="drop-zone">
            <input type="file" id="f-image" accept="image/jpeg,image/png,image/webp,image/gif" class="hidden" />
            <div id="drop-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
              <span>اضغط لاختيار صورة</span>
              <span class="drop-hint">JPG، PNG، WebP — حتى 10MB</span>
            </div>
            <div id="drop-preview" class="hidden">
              <img id="preview-img" src="" alt="preview" />
              <span id="preview-label">اضغط للتغيير</span>
            </div>
          </label>
          <div id="upload-progress-wrap" class="hidden">
            <div class="progress-labels">
              <span>جاري الرفع...</span>
              <span id="progress-pct">0%</span>
            </div>
            <div class="progress-bar-bg">
              <div id="progress-bar" class="progress-bar-fill" style="width:0%"></div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>رابط الشراء (Gumroad)</label>
          <input type="url" id="f-gumroad" placeholder="https://gumroad.com/l/..." required />
        </div>

        <div class="form-group">
          <label>اسم المؤلف</label>
          <input type="text" id="f-author" placeholder="أحمد" value="أحمد" />
        </div>

        <div class="form-group">
          <label>الوصف</label>
          <textarea id="f-desc" rows="3" placeholder="قصة مصورة عربية..." required></textarea>
        </div>

        <button type="submit" id="form-submit-btn" class="btn-submit">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          إضافة المنتج
        </button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
